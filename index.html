<!DOCTYPE html>
<html>
<head>
  <title>Delta Boom - Fireworks Buyers Club</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0b0b0b;
      color: white;
    }

    header {
      text-align: center;
      padding: 25px;
      background: black;
      border-bottom: 3px solid red;
    }

    h1 {
      color: #ff3c00;
      margin: 0;
    }

    h2 {
      color: #ffaa00;
    }

    .section {
      padding: 20px;
      border-bottom: 1px solid #333;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #333;
      padding: 8px;
    }

    th {
      background: #222;
    }

    input, select, textarea {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
    }

    .btn {
      background: red;
      color: white;
      padding: 12px;
      text-decoration: none;
      display: inline-block;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<div class="section">
  <h2>📝 Place Your Order</h2>

  <form action="https://formspree.io/f/mgoqllde" method="POST">

    <label>Name:</label>
    <input type="text" name="name" required>

    <label>Phone:</label>
    <input type="text" name="phone" required>

    <label>Email:</label>
    <input type="email" name="email" required>

    <label>Order Details:</label>
    <textarea name="order" rows="5" placeholder="List items + quantities" required></textarea>

    <label>Delivery Area:</label>
    <select name="delivery_area">
      <option>Memphis</option>
      <option>DeSoto County</option>
    </select>

    <input type="hidden" name="_subject" value="New Delta Boom Order">

    <button class="btn" type="submit">Submit Order</button>

  </form>

  <p>✅ We will contact you within 24 hours to confirm delivery.</p>
</div>
<body>

<header>
  <h1>🔥 DELTA BOOM 🔥</h1>
  <p>Fireworks Buyers Club – Save 20% vs Retail</p>
</header>

<div class="section">
  <h2>💥 Join the Club</h2>
  <p>$10 Annual Membership</p>
  <p>✔ Wholesale pricing access</p>
  <p>✔ Order direct from supplier</p>
  <p>✔ Local delivery available</p>

  <h3>💳 Join Now</h3>
